<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>เรียนภาษาจีน 🇨🇳</title>
<meta name="theme-color" content="#1A1A2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#FDFAF6;min-height:100vh}
.hero{background:linear-gradient(135deg,#1A1A2E,#2D1B4E);padding:32px 20px 28px;text-align:center;color:#fff}
.hero-emoji{font-size:44px;margin-bottom:8px}
.hero-title{font-size:28px;font-weight:900}
.hero-sub{color:#C8A96E;font-size:18px;margin-top:4px;font-weight:600}
.hero-desc{color:#aaa;font-size:13px;margin-top:10px}
.container{max-width:520px;margin:0 auto;padding:24px 16px}
.progress-label{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:#888}
.progress-bar{background:#F0EDE8;border-radius:8px;height:10px;overflow:hidden;margin-bottom:24px}
.progress-fill{height:100%;background:linear-gradient(90deg,#E8563A,#E8A23A);border-radius:8px;transition:width 0.5s ease}
.section-title{font-size:13px;font-weight:800;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin:20px 0 10px}
.lesson-btn{width:100%;background:#fff;border:2px solid #F0EDE8;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left;cursor:pointer;margin-bottom:10px;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.lesson-btn.done{border-color:var(--color)}
.lesson-btn.locked{background:#F5F3F0;opacity:0.5;cursor:not-allowed}
.lesson-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lesson-title{font-weight:800;font-size:14px;color:#1A1A2E}
.lesson-meta{font-size:11px;color:#999;margin-top:2px}
.lesson-meta.done{color:#3A9E6A;font-weight:700}
.lesson-arrow{color:var(--color);font-weight:800;font-size:18px;margin-left:auto;flex-shrink:0}
.complete-box{background:linear-gradient(135deg,#1A1A2E,#2D1B4E);border-radius:16px;padding:24px 20px;text-align:center;color:#fff;margin-top:24px}
.back-btn{background:none;border:none;color:#888;font-size:14px;cursor:pointer;margin-bottom:16px;padding:0}
.lesson-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab-btn{flex:1;padding:9px 4px;border-radius:9px;border:none;font-weight:700;font-size:12px;cursor:pointer;transition:all 0.2s}
.theory-box{background:#F8F5F0;border-radius:14px;padding:20px}
.theory-text{white-space:pre-line;line-height:1.9;font-size:14px;color:#333}
.next-btn{margin-top:20px;color:#fff;border:none;border-radius:10px;padding:11px 24px;font-weight:700;cursor:pointer;font-size:14px}
.words-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.word-card{cursor:pointer;user-select:none;background:#fff;border:2px solid #F0EDE8;border-radius:14px;padding:14px 10px;text-align:center;transition:all 0.25s;min-height:90px;display:flex;flex-direction:column;justify-content:center;gap:3px}
.word-card.flipped{background:#1A1A2E;border-color:#1A1A2E}
.word-zh{font-size:28px;font-weight:700;color:#1A1A2E}
.word-hint{font-size:10px;color:#bbb}
.word-pinyin{font-size:14px;font-weight:700}
.word-thai{font-size:13px;color:#C8A96E;margin-top:1px}
.word-meaning{font-size:14px;color:#fff;margin-top:3px;font-weight:600}
.quiz-box{background:#F8F5F0;border-radius:14px;padding:20px}
.quiz-header{display:flex;justify-content:space-between;margin-bottom:16px;font-size:13px;color:#888}
.quiz-question{font-weight:700;font-size:16px;margin-bottom:18px;line-height:1.5}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quiz-opt{padding:12px 8px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;background:#fff;color:#1A1A2E;line-height:1.4}
.quiz-result{text-align:center;padding:20px 0}
.result-btn{border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer}
.stat-box{background:#fff;border:1px solid #F0EDE8;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-around}
.stat-item{text-align:center}
.stat-num{font-size:22px;font-weight:900;color:#E8563A}
.stat-label{font-size:11px;color:#999;margin-top:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const LESSONS = [
  // ===== หมวด 1: พื้นฐาน =====
  {id:1,cat:"🏫 พื้นฐาน",title:"พินอิน & วรรณยุกต์",emoji:"🔤",color:"#E8563A",
   theory:`พินอินคือระบบถอดเสียงภาษาจีนด้วยตัวอักษรโรมัน\n\nภาษาจีนกลางมี 4 วรรณยุกต์ + เสียงเบา:\n🔴 วรรณยุกต์ 1 (ā) — เสียงสูงยาว คล้ายร้องเพลง\n🟠 วรรณยุกต์ 2 (á) — เสียงขึ้น คล้ายถามว่า "อ๊ะ?"\n🟢 วรรณยุกต์ 3 (ǎ) — เสียงลงแล้วขึ้น คล้าย "อ้า~"\n🔵 วรรณยุกต์ 4 (à) — เสียงลงแหลม คล้ายตกใจ "อ้า!"\n⚪ เสียงเบา — ออกเสียงสั้นเบาๆ`,
   words:[
     {zh:"妈",pinyin:"mā",thai:"มา (เสียงสูง)",meaning:"แม่",tone:1},
     {zh:"麻",pinyin:"má",thai:"หมา (เสียงขึ้น)",meaning:"งา/ชา",tone:2},
     {zh:"马",pinyin:"mǎ",thai:"หม่า (เสียงลงขึ้น)",meaning:"ม้า",tone:3},
     {zh:"骂",pinyin:"mà",thai:"มา้ (เสียงลง)",meaning:"ด่า",tone:4}
   ],
   quiz:[
     {q:"妈 (mā) แปลว่าอะไร?",opts:["ม้า","แม่","งา","ด่า"],a:1},
     {q:"วรรณยุกต์ที่ 2 เสียงเป็นอย่างไร?",opts:["เสียงสูงยาว","เสียงขึ้น","เสียงลงแล้วขึ้น","เสียงลง"],a:1},
     {q:"马 อ่านว่าอะไร?",opts:["มา","หมา","หม่า","ม้า"],a:2}
   ]},

  {id:2,cat:"🏫 พื้นฐาน",title:"การทักทาย",emoji:"👋",color:"#E8A23A",
   theory:`การทักทายเป็นสิ่งแรกที่ต้องเรียน!\nในภาษาจีนการทักทายแตกต่างกันตามช่วงเวลาและสถานการณ์`,
   words:[
     {zh:"你好",pinyin:"nǐ hǎo",thai:"หนี่ เห่า",meaning:"สวัสดี"},
     {zh:"早上好",pinyin:"zǎo shang hǎo",thai:"เจ่า ซาง เห่า",meaning:"อรุณสวัสดิ์"},
     {zh:"晚上好",pinyin:"wǎn shang hǎo",thai:"หว่าน ซาง เห่า",meaning:"สวัสดีตอนเย็น"},
     {zh:"谢谢",pinyin:"xiè xiè",thai:"เซี้ย เซี้ย",meaning:"ขอบคุณ"},
     {zh:"对不起",pinyin:"duì bu qǐ",thai:"ตุ้ย ปู้ ฉี่",meaning:"ขอโทษ"},
     {zh:"再见",pinyin:"zài jiàn",thai:"ไจ้ เจี้ยน",meaning:"ลาก่อน"},
     {zh:"不客气",pinyin:"bù kè qì",thai:"ปู้ เค่อ ชี่",meaning:"ไม่เป็นไร"},
     {zh:"没关系",pinyin:"méi guān xi",thai:"เหมย กวาน ซี",meaning:"ไม่เป็นไร (อีกแบบ)"}
   ],
   quiz:[
     {q:"\"ขอบคุณ\" ในภาษาจีนคือ?",opts:["你好","再见","谢谢","对不起"],a:2},
     {q:"再见 อ่านว่าอะไร?",opts:["เซี้ย เซี้ย","หนี่ เห่า","ไจ้ เจี้ยน","ตุ้ย ปู้ ฉี่"],a:2},
     {q:"\"ลาก่อน\" ในภาษาจีนคือ?",opts:["你好","谢谢","对不起","再见"],a:3}
   ]},

  {id:3,cat:"🏫 พื้นฐาน",title:"ตัวเลข 0–100",emoji:"🔢",color:"#3A9E6A",
   theory:`ตัวเลขสำคัญมากในชีวิตประจำวัน\nเลข 11-19 = 十+เลขหลักหน่วย เช่น 11 = 十一\nเลข 20,30... = เลขสิบ+十 เช่น 20 = 二十`,
   words:[
     {zh:"零",pinyin:"líng",thai:"หลิง",meaning:"0"},
     {zh:"一",pinyin:"yī",thai:"อี",meaning:"1"},
     {zh:"二",pinyin:"èr",thai:"เอ้อ",meaning:"2"},
     {zh:"三",pinyin:"sān",thai:"ซาน",meaning:"3"},
     {zh:"四",pinyin:"sì",thai:"ซื่อ",meaning:"4"},
     {zh:"五",pinyin:"wǔ",thai:"หวู่",meaning:"5"},
     {zh:"六",pinyin:"liù",thai:"หลิ่ว",meaning:"6"},
     {zh:"七",pinyin:"qī",thai:"ชี",meaning:"7"},
     {zh:"八",pinyin:"bā",thai:"ปา",meaning:"8"},
     {zh:"九",pinyin:"jiǔ",thai:"จิ่ว",meaning:"9"},
     {zh:"十",pinyin:"shí",thai:"สือ",meaning:"10"},
     {zh:"百",pinyin:"bǎi",thai:"ไป่",meaning:"100"}
   ],
   quiz:[
     {q:"五 (wǔ) คือเลขอะไร?",opts:["3","4","5","6"],a:2},
     {q:"เลข 8 ในภาษาจีนคือ?",opts:["七","八","九","六"],a:1},
     {q:"\"ไป่\" คือเลขอะไร?",opts:["10","50","100","1000"],a:2}
   ]},

  {id:4,cat:"🏫 พื้นฐาน",title:"คำสรรพนาม",emoji:"🙋",color:"#3A6AE8",
   theory:`คำสรรพนามเป็นพื้นฐานในการสร้างประโยค\nเพิ่ม 们 (men/เมิน) หลังสรรพนาม เพื่อทำให้เป็นพหูพจน์`,
   words:[
     {zh:"我",pinyin:"wǒ",thai:"หว่อ",meaning:"ฉัน/ผม"},
     {zh:"你",pinyin:"nǐ",thai:"หนี่",meaning:"คุณ"},
     {zh:"他",pinyin:"tā",thai:"ทา",meaning:"เขา (ชาย)"},
     {zh:"她",pinyin:"tā",thai:"ทา",meaning:"เธอ (หญิง)"},
     {zh:"我们",pinyin:"wǒ men",thai:"หว่อ เมิน",meaning:"พวกเรา"},
     {zh:"你们",pinyin:"nǐ men",thai:"หนี่ เมิน",meaning:"พวกคุณ"},
     {zh:"他们",pinyin:"tā men",thai:"ทา เมิน",meaning:"พวกเขา"}
   ],
   quiz:[
     {q:"\"ฉัน\" ในภาษาจีนคือ?",opts:["你","他","我","她"],a:2},
     {q:"我们 อ่านว่าอะไร?",opts:["หนี่ เมิน","ทา เมิน","หว่อ เมิน","ชี เมิน"],a:2},
     {q:"จะพูดว่า \"พวกคุณ\" ใช้คำว่า?",opts:["我们","他们","你们","她们"],a:2}
   ]},

  {id:5,cat:"🏫 พื้นฐาน",title:"ประโยคแนะนำตัว",emoji:"💬",color:"#9B3AE8",
   theory:`โครงสร้างประโยคภาษาจีน: ประธาน + กริยา + กรรม\n\nคำถามใช้ 吗 (ma/มา) ต่อท้าย\nปฏิเสธใช้ 不 (bù/ปู้) นำหน้ากริยา`,
   words:[
     {zh:"我是泰国人",pinyin:"wǒ shì tài guó rén",thai:"หว่อ สื่อ ไท่ กั๋ว เหริน",meaning:"ฉันเป็นคนไทย"},
     {zh:"你叫什么名字",pinyin:"nǐ jiào shén me míng zi",thai:"หนี่ เจี้ยว เสิน เมอ หมิง จึ",meaning:"คุณชื่ออะไร?"},
     {zh:"我叫…",pinyin:"wǒ jiào...",thai:"หว่อ เจี้ยว...",meaning:"ฉันชื่อ..."},
     {zh:"你好吗",pinyin:"nǐ hǎo ma",thai:"หนี่ เห่า มา",meaning:"คุณสบายดีไหม?"},
     {zh:"我很好",pinyin:"wǒ hěn hǎo",thai:"หว่อ เหิ่น เห่า",meaning:"ฉันสบายดีมาก"},
     {zh:"很高兴认识你",pinyin:"hěn gāo xìng rèn shi nǐ",thai:"เหิ่น เกา ซิ่ง เริ่น สื อ หนี่",meaning:"ยินดีที่ได้รู้จัก"}
   ],
   quiz:[
     {q:"จะถามว่า \"สบายดีไหม?\"",opts:["你好","你好吗","我很好","谢谢"],a:1},
     {q:"不 (bù/ปู้) ใช้ทำอะไร?",opts:["ถามคำถาม","ปฏิเสธ","ทักทาย","ขอบคุณ"],a:1},
     {q:"\"ยินดีที่ได้รู้จัก\" ภาษาจีนคือ?",opts:["你好吗","我很好","很高兴认识你","我叫…"],a:2}
   ]},

  // ===== หมวด 2: ชีวิตประจำวัน =====
  {id:6,cat:"🍜 อาหาร",title:"อาหารและร้านอาหาร",emoji:"🍜",color:"#E8563A",
   theory:`ภาษาจีนที่ใช้ในร้านอาหาร\n吃 (chī/ชือ) = กิน\n喝 (hē/เฮอ) = ดื่ม\n要 (yào/เหยา) = ต้องการ/ขอ`,
   words:[
     {zh:"好吃",pinyin:"hǎo chī",thai:"เห่า ชือ",meaning:"อร่อย"},
     {zh:"我要这个",pinyin:"wǒ yào zhè ge",thai:"หว่อ เหยา เจ้อ เกอ",meaning:"ขออันนี้"},
     {zh:"多少钱",pinyin:"duō shao qián",thai:"ตัว เซา เฉียน",meaning:"ราคาเท่าไหร่?"},
     {zh:"菜单",pinyin:"cài dān",thai:"ไช่ ตาน",meaning:"เมนู"},
     {zh:"水",pinyin:"shuǐ",thai:"สุ่ย",meaning:"น้ำ"},
     {zh:"米饭",pinyin:"mǐ fàn",thai:"หมี่ ฝาน",meaning:"ข้าว"},
     {zh:"面条",pinyin:"miàn tiáo",thai:"เมี่ยน เถียว",meaning:"เส้นหมี่/ราเมน"},
     {zh:"买单",pinyin:"mǎi dān",thai:"ม่าย ตาน",meaning:"เก็บเงิน/เช็คบิล"}
   ],
   quiz:[
     {q:"\"อร่อย\" ในภาษาจีนคือ?",opts:["好吃","多少钱","菜单","买单"],a:0},
     {q:"多少钱 อ่านว่าอะไร?",opts:["ม่าย ตาน","ตัว เซา เฉียน","ไช่ ตาน","เห่า ชือ"],a:1},
     {q:"จะขอเช็คบิลพูดว่า?",opts:["菜单","水","买单","米饭"],a:2}
   ]},

  {id:7,cat:"🚇 การเดินทาง",title:"การเดินทางและถามทาง",emoji:"🗺️",color:"#E8A23A",
   theory:`คำถามทางสำคัญ:\n在哪里 (zài nǎ lǐ/ไจ้ หน่า หลี่) = อยู่ที่ไหน?\n怎么走 (zěn me zǒu/เจิ่น เมอ โจ่ว) = ไปทางไหน?`,
   words:[
     {zh:"在哪里",pinyin:"zài nǎ lǐ",thai:"ไจ้ หน่า หลี่",meaning:"อยู่ที่ไหน?"},
     {zh:"左",pinyin:"zuǒ",thai:"จั่ว",meaning:"ซ้าย"},
     {zh:"右",pinyin:"yòu",thai:"โย่ว",meaning:"ขวา"},
     {zh:"直走",pinyin:"zhí zǒu",thai:"จือ โจ่ว",meaning:"ตรงไป"},
     {zh:"地铁",pinyin:"dì tiě",thai:"ตี้ เถี่ย",meaning:"รถไฟฟ้า/MRT"},
     {zh:"公共汽车",pinyin:"gōng gòng qì chē",thai:"กง กง ชี่ เชอ",meaning:"รถบัส"},
     {zh:"出租车",pinyin:"chū zū chē",thai:"ชู จู เชอ",meaning:"แท็กซี่"},
     {zh:"机场",pinyin:"jī chǎng",thai:"จี ฉ่าง",meaning:"สนามบิน"}
   ],
   quiz:[
     {q:"\"ซ้าย\" ในภาษาจีนคือ?",opts:["右","左","直走","在哪里"],a:1},
     {q:"地铁 อ่านว่าอะไร?",opts:["ชู จู เชอ","จี ฉ่าง","ตี้ เถี่ย","กง กง ชี่ เชอ"],a:2},
     {q:"\"สนามบิน\" ในภาษาจีนคือ?",opts:["地铁","出租车","公共汽车","机场"],a:3}
   ]},

  {id:8,cat:"🛍️ การซื้อของ",title:"การซื้อของและต่อราคา",emoji:"🛍️",color:"#3A9E6A",
   theory:`การต่อราคาเป็นทักษะสำคัญ!\n块 (kuài/ไคว่) = หยวน (เงินจีน)\n太贵了 (tài guì le/ไท่ กุ้ย เลอ) = แพงเกินไป!`,
   words:[
     {zh:"多少钱",pinyin:"duō shao qián",thai:"ตัว เซา เฉียน",meaning:"ราคาเท่าไหร่?"},
     {zh:"太贵了",pinyin:"tài guì le",thai:"ไท่ กุ้ย เลอ",meaning:"แพงเกินไป!"},
     {zh:"便宜一点",pinyin:"pián yi yī diǎn",thai:"เพียน อี อี เตี่ยน",meaning:"ลดหน่อยได้ไหม?"},
     {zh:"我要买",pinyin:"wǒ yào mǎi",thai:"หว่อ เหยา ม่าย",meaning:"ฉันจะซื้อ"},
     {zh:"不要",pinyin:"bù yào",thai:"ปู้ เหยา",meaning:"ไม่เอา"},
     {zh:"有没有",pinyin:"yǒu méi yǒu",thai:"โหยว เหมย โหยว",meaning:"มีไหม?"},
     {zh:"大",pinyin:"dà",thai:"ต้า",meaning:"ใหญ่"},
     {zh:"小",pinyin:"xiǎo",thai:"เสี่ยว",meaning:"เล็ก"}
   ],
   quiz:[
     {q:"จะบอกว่า \"แพงเกินไป\" พูดว่า?",opts:["多少钱","太贵了","便宜一点","不要"],a:1},
     {q:"便宜一点 แปลว่าอะไร?",opts:["ราคาเท่าไหร่","ฉันจะซื้อ","ลดหน่อยได้ไหม","มีไหม"],a:2},
     {q:"\"เล็ก\" ในภาษาจีนคือ?",opts:["大","小","多","少"],a:1}
   ]},

  {id:9,cat:"👨‍👩‍👧 ครอบครัว",title:"สมาชิกในครอบครัว",emoji:"👨‍👩‍👧",color:"#3A6AE8",
   theory:`ภาษาจีนแยกคำเรียกญาติตามฝั่งพ่อและแม่อย่างละเอียด\nที่เรียนคือคำที่ใช้บ่อยที่สุดในชีวิตประจำวัน`,
   words:[
     {zh:"爸爸",pinyin:"bà ba",thai:"ป้า ปา",meaning:"พ่อ"},
     {zh:"妈妈",pinyin:"mā ma",thai:"มา มา",meaning:"แม่"},
     {zh:"哥哥",pinyin:"gē ge",thai:"เกอ เกอ",meaning:"พี่ชาย"},
     {zh:"姐姐",pinyin:"jiě jie",thai:"เจี่ย เจีย",meaning:"พี่สาว"},
     {zh:"弟弟",pinyin:"dì di",thai:"ตี้ ตี",meaning:"น้องชาย"},
     {zh:"妹妹",pinyin:"mèi mei",thai:"เม่ย เมย",meaning:"น้องสาว"},
     {zh:"爷爷",pinyin:"yé ye",thai:"เย๋ เยีย",meaning:"ปู่"},
     {zh:"奶奶",pinyin:"nǎi nai",thai:"หน่าย นาย",meaning:"ย่า"}
   ],
   quiz:[
     {q:"\"แม่\" ในภาษาจีนคือ?",opts:["爸爸","妈妈","奶奶","姐姐"],a:1},
     {q:"弟弟 (ตี้ ตี) แปลว่าอะไร?",opts:["พี่ชาย","น้องสาว","น้องชาย","พี่สาว"],a:2},
     {q:"\"ปู่\" ในภาษาจีนคือ?",opts:["奶奶","爷爷","爸爸","妈妈"],a:1}
   ]},

  {id:10,cat:"📅 เวลา",title:"วัน เดือน เวลา",emoji:"📅",color:"#9B3AE8",
   theory:`วันในสัปดาห์ใช้ 星期 (xīng qī/ซิง ชี) + ตัวเลข\nยกเว้นวันอาทิตย์ใช้ 星期天 หรือ 星期日\nบอกเวลา: เลข + 点 (diǎn/เตี่ยน) = นาฬิกา`,
   words:[
     {zh:"今天",pinyin:"jīn tiān",thai:"จิน เทียน",meaning:"วันนี้"},
     {zh:"明天",pinyin:"míng tiān",thai:"หมิง เทียน",meaning:"พรุ่งนี้"},
     {zh:"昨天",pinyin:"zuó tiān",thai:"จั๋ว เทียน",meaning:"เมื่อวาน"},
     {zh:"星期一",pinyin:"xīng qī yī",thai:"ซิง ชี อี",meaning:"วันจันทร์"},
     {zh:"星期六",pinyin:"xīng qī liù",thai:"ซิง ชี หลิ่ว",meaning:"วันเสาร์"},
     {zh:"星期天",pinyin:"xīng qī tiān",thai:"ซิง ชี เทียน",meaning:"วันอาทิตย์"},
     {zh:"几点",pinyin:"jǐ diǎn",thai:"จี่ เตี่ยน",meaning:"กี่โมงแล้ว?"},
     {zh:"现在",pinyin:"xiàn zài",thai:"เซี่ยน ไจ้",meaning:"ตอนนี้"}
   ],
   quiz:[
     {q:"\"พรุ่งนี้\" ในภาษาจีนคือ?",opts:["今天","昨天","明天","现在"],a:2},
     {q:"星期天 อ่านว่าอะไร?",opts:["จิน เทียน","ซิง ชี เทียน","หมิง เทียน","จั๋ว เทียน"],a:1},
     {q:"จะถามว่า \"กี่โมงแล้ว?\" พูดว่า?",opts:["现在","今天","几点","明天"],a:2}
   ]},

  // ===== หมวด 3: สี & คำคุณศัพท์ =====
  {id:11,cat:"🎨 สีและคำคุณศัพท์",title:"สีต่างๆ",emoji:"🎨",color:"#E8563A",
   theory:`สีในภาษาจีนมักตามด้วย 色 (sè/เซ่อ) แปลว่า "สี"\nเช่น 红色 = สีแดง แต่ในประโยคทั่วไปละ 色 ได้`,
   words:[
     {zh:"红色",pinyin:"hóng sè",thai:"หง เซ่อ",meaning:"สีแดง"},
     {zh:"蓝色",pinyin:"lán sè",thai:"หลาน เซ่อ",meaning:"สีน้ำเงิน"},
     {zh:"绿色",pinyin:"lǜ sè",thai:"หลี่ว เซ่อ",meaning:"สีเขียว"},
     {zh:"黄色",pinyin:"huáng sè",thai:"หวาง เซ่อ",meaning:"สีเหลือง"},
     {zh:"白色",pinyin:"bái sè",thai:"ไป๋ เซ่อ",meaning:"สีขาว"},
     {zh:"黑色",pinyin:"hēi sè",thai:"เฮย เซ่อ",meaning:"สีดำ"},
     {zh:"粉色",pinyin:"fěn sè",thai:"เฝิ่น เซ่อ",meaning:"สีชมพู"},
     {zh:"橙色",pinyin:"chéng sè",thai:"เฉิง เซ่อ",meaning:"สีส้ม"}
   ],
   quiz:[
     {q:"\"สีแดง\" ในภาษาจีนคือ?",opts:["蓝色","绿色","红色","黄色"],a:2},
     {q:"白色 (ไป๋ เซ่อ) แปลว่า?",opts:["สีดำ","สีขาว","สีเทา","สีน้ำเงิน"],a:1},
     {q:"\"สีเหลือง\" อ่านว่าอะไร?",opts:["หง เซ่อ","หลาน เซ่อ","หวาง เซ่อ","เฮย เซ่อ"],a:2}
   ]},

  {id:12,cat:"🎨 สีและคำคุณศัพท์",title:"คำคุณศัพท์พื้นฐาน",emoji:"✨",color:"#E8A23A",
   theory:`คำคุณศัพท์ในภาษาจีนวางหน้านาม\nใช้ 很 (hěn/เหิ่น) = มาก เพิ่มความรู้สึก\nเช่น 很好 = ดีมาก, 很大 = ใหญ่มาก`,
   words:[
     {zh:"好",pinyin:"hǎo",thai:"เห่า",meaning:"ดี"},
     {zh:"坏",pinyin:"huài",thai:"ไหว้",meaning:"เลว/ไม่ดี"},
     {zh:"大",pinyin:"dà",thai:"ต้า",meaning:"ใหญ่"},
     {zh:"小",pinyin:"xiǎo",thai:"เสี่ยว",meaning:"เล็ก"},
     {zh:"多",pinyin:"duō",thai:"ตัว",meaning:"มาก"},
     {zh:"少",pinyin:"shǎo",thai:"เซ่า",meaning:"น้อย"},
     {zh:"贵",pinyin:"guì",thai:"กุ้ย",meaning:"แพง"},
     {zh:"便宜",pinyin:"pián yi",thai:"เพียน อี",meaning:"ถูก"}
   ],
   quiz:[
     {q:"\"ถูก (ราคา)\" ในภาษาจีนคือ?",opts:["贵","便宜","多","少"],a:1},
     {q:"很大 แปลว่าอะไร?",opts:["ดีมาก","เล็กมาก","ใหญ่มาก","แพงมาก"],a:2},
     {q:"\"น้อย\" อ่านว่าอะไร?",opts:["ตัว","เห่า","เซ่า","กุ้ย"],a:2}
   ]}
];

const TONE_COLORS={1:"#E8563A",2:"#E8A23A",3:"#3A9E6A",4:"#3A6AE8"};
const CATS=[...new Set(LESSONS.map(l=>l.cat))];
let completedIds=JSON.parse(localStorage.getItem('zhCompleted')||'[]');
let activeLesson=null,quizState=null,flippedCards={};

function save(){localStorage.setItem('zhCompleted',JSON.stringify(completedIds));}

function render(){
  document.getElementById('app').innerHTML=activeLesson?renderLesson():renderHome();
  bindEvents();
}

function renderHome(){
  const done=completedIds.length,total=LESSONS.length,pct=Math.round(done/total*100);
  const totalWords=LESSONS.reduce((s,l)=>s+l.words.length,0);
  let html=`
  <div class="hero"><div class="hero-emoji">🇨🇳</div><div class="hero-title">เรียนภาษาจีน</div><div class="hero-sub">从零开始 · เริ่มจาก 0</div><div class="hero-desc">12 บทเรียน · มีคำอ่านภาษาไทย</div></div>
  <div class="container">
    <div class="stat-box">
      <div class="stat-item"><div class="stat-num">${done}</div><div class="stat-label">บทผ่านแล้ว</div></div>
      <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-label">บทเรียนทั้งหมด</div></div>
      <div class="stat-item"><div class="stat-num">${totalWords}</div><div class="stat-label">คำศัพท์</div></div>
    </div>
    <div class="progress-label"><span>ความคืบหน้า</span><span>${done}/${total} (${pct}%)</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  CATS.forEach(cat=>{
    const catLessons=LESSONS.filter(l=>l.cat===cat);
    html+=`<div class="section-title">${cat}</div>`;
    catLessons.forEach((l,gi)=>{
      const idx=LESSONS.indexOf(l);
      const isDone=completedIds.includes(l.id);
      const locked=idx>0&&!completedIds.includes(LESSONS[idx-1].id);
      html+=`<button class="lesson-btn${isDone?' done':''}${locked?' locked':''}" style="--color:${l.color}" data-id="${l.id}" ${locked?'disabled':''}>
        <div class="lesson-icon" style="background:${locked?'#ddd':l.color+'22'}">${locked?'🔒':l.emoji}</div>
        <div style="flex:1">
          <div class="lesson-title" style="color:${locked?'#aaa':'#1A1A2E'}">บทที่ ${l.id}: ${l.title}</div>
          <div class="lesson-meta${isDone?' done':''}">${locked?'ผ่านบทก่อนหน้าก่อน':isDone?'✅ ผ่านแล้ว':`${l.words.length} คำศัพท์ · ${l.quiz.length} คำถาม`}</div>
        </div>
        ${!locked?`<div class="lesson-arrow" style="color:${l.color}">›</div>`:''}
      </button>`;
    });
  });

  if(done===total) html+=`<div class="complete-box"><div style="font-size:40px;margin-bottom:8px">🏆</div><div style="font-weight:900;font-size:20px">จบหลักสูตรแล้ว!</div><div style="color:#C8A96E;margin-top:6px;font-size:14px">厉害了！(lì hài le) เก่งมากเลย!</div></div>`;
  html+=`</div>`;
  return html;
}

function renderLesson(){
  const l=activeLesson,tab=l._tab||'theory',isDone=completedIds.includes(l.id);
  const tabs=[{k:'theory',label:'📖 ทฤษฎี'},{k:'words',label:'🃏 คำศัพท์'},{k:'quiz',label:'📝 แบบทดสอบ'}];
  let content='';
  if(tab==='theory'){
    content=`<div class="theory-box"><div class="theory-text">${l.theory}</div><button class="next-btn" style="background:${l.color}" data-tab="words">เรียนคำศัพท์ →</button></div>`;
  } else if(tab==='words'){
    const cards=l.words.map((w,i)=>{
      const fl=flippedCards[i];
      return `<div class="word-card${fl?' flipped':''}" data-card="${i}">
        ${fl?`<div class="word-pinyin" style="color:${w.tone?TONE_COLORS[w.tone]:l.color}">${w.pinyin}</div>
               <div class="word-thai">${w.thai}</div>
               <div class="word-meaning">${w.meaning}</div>`
           :`<div class="word-zh">${w.zh}</div><div class="word-hint">แตะดูคำอ่าน+ความหมาย</div>`}
      </div>`;
    }).join('');
    content=`<p style="color:#888;font-size:13px;margin-bottom:16px">แตะการ์ดเพื่อดูคำอ่านภาษาไทย + ความหมาย</p><div class="words-grid">${cards}</div><button class="next-btn" style="background:${l.color};width:100%;text-align:center" data-tab="quiz">ทำแบบทดสอบ →</button>`;
  } else {
    content=renderQuiz(l);
  }
  return `<div style="max-width:520px;margin:0 auto;padding:24px 16px">
    <button class="back-btn" id="backBtn">← กลับ</button>
    <div class="lesson-header">
      <div class="lesson-icon" style="background:${l.color}22;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px">${l.emoji}</div>
      <div><div style="font-weight:800;font-size:18px">${l.title}</div>${isDone?'<div style="color:#3A9E6A;font-size:12px;font-weight:600">✅ ผ่านแล้ว</div>':''}</div>
    </div>
    <div class="tabs">${tabs.map(t=>`<button class="tab-btn" style="background:${tab===t.k?l.color:'#F0EDE8'};color:${tab===t.k?'#fff':'#666'}" data-tab="${t.k}">${t.label}</button>`).join('')}</div>
    ${content}
  </div>`;
}

function renderQuiz(l){
  if(!quizState) quizState={current:0,selected:null,score:0,done:false};
  if(quizState.done){
    const passed=quizState.score>=Math.ceil(l.quiz.length*0.7);
    return `<div class="quiz-box"><div class="quiz-result">
      <div style="font-size:52px">${passed?'🎉':'💪'}</div>
      <div style="font-size:22px;font-weight:700;margin-top:8px">${quizState.score}/${l.quiz.length} ข้อถูก</div>
      <div style="color:#888;margin-top:4px;margin-bottom:20px">${passed?'ผ่านแล้ว! ยอดเยี่ยม':'ลองทำใหม่นะ'}</div>
      ${passed?`<button class="result-btn" style="background:#E8563A;color:#fff" id="completeBtn">บทเรียนถัดไป →</button>`:`<button class="result-btn" style="background:#1A1A2E;color:#fff" id="retryBtn">ลองใหม่</button>`}
    </div></div>`;
  }
  const q=l.quiz[quizState.current];
  const opts=q.opts.map((o,i)=>{
    let bg='#fff',color='#1A1A2E';
    if(quizState.selected!==null){
      if(i===q.a){bg='#3A9E6A';color='#fff';}
      else if(i===quizState.selected&&quizState.selected!==q.a){bg='#E8563A';color='#fff';}
    }
    return `<button class="quiz-opt" style="background:${bg};color:${color}" data-opt="${i}" ${quizState.selected!==null?'disabled':''}>${o}</button>`;
  }).join('');
  return `<div class="quiz-box">
    <div class="quiz-header"><span>ข้อ ${quizState.current+1}/${l.quiz.length}</span><span>✅ ${quizState.score} ถูก</span></div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">${opts}</div>
  </div>`;
}

function bindEvents(){
  document.querySelectorAll('.lesson-btn:not([disabled])').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeLesson={...LESSONS.find(l=>l.id===parseInt(btn.dataset.id)),_tab:'theory'};
      flippedCards={};quizState=null;render();
    });
  });
  document.getElementById('backBtn')?.addEventListener('click',()=>{activeLesson=null;render();});
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{activeLesson._tab=btn.dataset.tab;if(btn.dataset.tab==='quiz')quizState=null;flippedCards={};render();});
  });
  document.querySelectorAll('.next-btn[data-tab]').forEach(btn=>{
    btn.addEventListener('click',()=>{activeLesson._tab=btn.dataset.tab;if(btn.dataset.tab==='quiz')quizState=null;flippedCards={};render();});
  });
  document.querySelectorAll('.word-card').forEach(card=>{
    card.addEventListener('click',()=>{const i=parseInt(card.dataset.card);flippedCards[i]=!flippedCards[i];render();});
  });
  document.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.dataset.opt),l=activeLesson,q=l.quiz[quizState.current];
      quizState.selected=i;
      if(i===q.a) quizState.score++;
      render();
      setTimeout(()=>{
        if(quizState.current+1<l.quiz.length){quizState.current++;quizState.selected=null;render();}
        else{quizState.done=true;render();}
      },900);
    });
  });
  document.getElementById('completeBtn')?.addEventListener('click',()=>{
    if(!completedIds.includes(activeLesson.id)){completedIds.push(activeLesson.id);save();}
    activeLesson=null;render();
  });
  document.getElementById('retryBtn')?.addEventListener('click',()=>{quizState=null;render();});
}

render();
</script>
</body>
</html>
