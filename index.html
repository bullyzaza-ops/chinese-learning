<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>เรียนภาษาจีน 🇨🇳</title>
<meta name="theme-color" content="#1A1A2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#FDFAF6;min-height:100vh;padding-bottom:80px}
.hero{background:linear-gradient(135deg,#1A1A2E,#2D1B4E);padding:28px 20px 24px;text-align:center;color:#fff}
.hero-emoji{font-size:40px;margin-bottom:6px}
.hero-title{font-size:26px;font-weight:900}
.hero-sub{color:#C8A96E;font-size:16px;margin-top:4px;font-weight:600}
.container{max-width:520px;margin:0 auto;padding:20px 16px}
/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F0EDE8;display:flex;z-index:100}
.nav-btn{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:700;color:#bbb;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:#E8563A}
.nav-btn span{font-size:22px}
/* PROGRESS */
.progress-bar{background:#F0EDE8;border-radius:8px;height:8px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,#E8563A,#E8A23A);border-radius:8px;transition:width 0.5s}
/* STATS */
.stat-row{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:#fff;border:1px solid #F0EDE8;border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:900;color:#E8563A}
.stat-label{font-size:10px;color:#999;margin-top:2px}
/* LESSONS */
.section-title{font-size:12px;font-weight:800;color:#bbb;letter-spacing:1px;margin:18px 0 8px}
.lesson-btn{width:100%;background:#fff;border:2px solid #F0EDE8;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;text-align:left;cursor:pointer;margin-bottom:8px;transition:all 0.2s}
.lesson-btn.done{border-color:var(--color)}
.lesson-btn.locked{background:#F5F3F0;opacity:0.5;cursor:not-allowed}
.lesson-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.lesson-title{font-weight:800;font-size:13px;color:#1A1A2E}
.lesson-meta{font-size:11px;color:#999;margin-top:2px}
.lesson-meta.done{color:#3A9E6A;font-weight:700}
/* LESSON VIEW */
.back-btn{background:none;border:none;color:#888;font-size:14px;cursor:pointer;margin-bottom:14px;padding:0}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab-btn{flex:1;padding:8px 2px;border-radius:8px;border:none;font-weight:700;font-size:11px;cursor:pointer;transition:all 0.2s}
.theory-box{background:#F8F5F0;border-radius:14px;padding:18px}
.theory-text{white-space:pre-line;line-height:1.9;font-size:14px;color:#333}
.next-btn{margin-top:16px;color:#fff;border:none;border-radius:10px;padding:11px 22px;font-weight:700;cursor:pointer;font-size:14px}
/* WORD CARDS */
.words-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.word-card{cursor:pointer;user-select:none;background:#fff;border:2px solid #F0EDE8;border-radius:14px;padding:14px 10px;text-align:center;min-height:100px;display:flex;flex-direction:column;justify-content:center;gap:3px;position:relative}
.word-card.flipped{background:#1A1A2E;border-color:#1A1A2E}
.word-zh{font-size:28px;font-weight:700;color:#1A1A2E}
.word-hint{font-size:10px;color:#bbb}
.word-pinyin{font-size:13px;font-weight:700}
.word-thai{font-size:12px;color:#C8A96E;margin-top:1px}
.word-meaning{font-size:13px;color:#fff;margin-top:3px;font-weight:600}
.sound-btn{position:absolute;top:6px;right:6px;background:none;border:none;cursor:pointer;font-size:16px;opacity:0.6}
/* QUIZ */
.quiz-box{background:#F8F5F0;border-radius:14px;padding:18px}
.quiz-header{display:flex;justify-content:space-between;margin-bottom:14px;font-size:13px;color:#888}
.quiz-question{font-weight:700;font-size:15px;margin-bottom:16px;line-height:1.5}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quiz-opt{padding:11px 8px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#1A1A2E;line-height:1.4}
/* FLASHCARD */
.fc-container{text-align:center;padding:10px 0}
.fc-progress{font-size:12px;color:#888;margin-bottom:12px}
.fc-card{background:#fff;border:2px solid #F0EDE8;border-radius:20px;padding:40px 24px;margin-bottom:20px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;position:relative}
.fc-card.revealed{background:#1A1A2E;border-color:#1A1A2E}
.fc-zh{font-size:52px;font-weight:700;color:#1A1A2E;margin-bottom:8px}
.fc-hint{font-size:12px;color:#bbb}
.fc-pinyin{font-size:18px;font-weight:700;margin-bottom:4px}
.fc-thai{font-size:15px;color:#C8A96E;margin-bottom:6px}
.fc-meaning{font-size:18px;color:#fff;font-weight:700}
.fc-btns{display:flex;gap:12px;justify-content:center}
.fc-btn{flex:1;max-width:140px;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:800;cursor:pointer}
.fc-btn.no{background:#FEE2E2;color:#E8563A}
.fc-btn.yes{background:#D1FAE5;color:#3A9E6A}
/* STATS PAGE */
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-bar-label{font-size:12px;color:#555;width:80px;flex-shrink:0;text-align:right}
.chart-bar-bg{flex:1;background:#F0EDE8;border-radius:6px;height:22px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;transition:width 0.6s}
/* AI TEACHER */
.ai-box{background:#fff;border:1px solid #F0EDE8;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 220px);max-height:500px}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:85%;padding:12px 14px;border-radius:14px;font-size:14px;line-height:1.6}
.ai-msg.bot{background:#F0EDE8;color:#1A1A2E;align-self:flex-start;border-bottom-left-radius:4px}
.ai-msg.user{background:#E8563A;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid #F0EDE8}
.ai-input{flex:1;border:1.5px solid #F0EDE8;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;background:#FDFAF6}
.ai-send{background:#E8563A;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:14px}
.ai-thinking{display:flex;gap:4px;align-items:center;padding:4px 0}
.ai-dot{width:7px;height:7px;background:#bbb;border-radius:50%;animation:bounce 1.2s infinite}
.ai-dot:nth-child(2){animation-delay:0.2s}
.ai-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.suggest-btn{background:#F0EDE8;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;color:#555;cursor:pointer;margin:3px}
.complete-box{background:linear-gradient(135deg,#1A1A2E,#2D1B4E);border-radius:16px;padding:24px;text-align:center;color:#fff;margin-top:20px}
.xp-badge{display:inline-block;background:#C8A96E;color:#1A1A2E;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;margin-left:6px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===== DATA =====
const LESSONS=[
  {id:1,cat:"🏫 พื้นฐาน",title:"พินอิน & วรรณยุกต์",emoji:"🔤",color:"#E8563A",xp:30,
   theory:`พินอินคือระบบถอดเสียงภาษาจีนด้วยตัวอักษรโรมัน\n\n🔴 วรรณยุกต์ 1 (ā) — เสียงสูงยาว คล้ายร้องเพลง\n🟠 วรรณยุกต์ 2 (á) — เสียงขึ้น คล้ายถามว่า "อ๊ะ?"\n🟢 วรรณยุกต์ 3 (ǎ) — เสียงลงแล้วขึ้น คล้าย "อ้า~"\n🔵 วรรณยุกต์ 4 (à) — เสียงลงแหลม คล้ายตกใจ "อ้า!"\n⚪ เสียงเบา — ออกเสียงสั้นเบาๆ`,
   words:[{zh:"妈",pinyin:"mā",thai:"มา",meaning:"แม่",tone:1},{zh:"麻",pinyin:"má",thai:"หมา",meaning:"งา",tone:2},{zh:"马",pinyin:"mǎ",thai:"หม่า",meaning:"ม้า",tone:3},{zh:"骂",pinyin:"mà",thai:"มา้",meaning:"ด่า",tone:4}],
   quiz:[{q:"妈 แปลว่า?",opts:["ม้า","แม่","งา","ด่า"],a:1},{q:"วรรณยุกต์ 3 เสียงเป็นอย่างไร?",opts:["สูงยาว","ขึ้น","ลงแล้วขึ้น","ลง"],a:2},{q:"马 อ่านว่า?",opts:["มา","หมา","หม่า","ม้า"],a:2}]},
  {id:2,cat:"🏫 พื้นฐาน",title:"การทักทาย",emoji:"👋",color:"#E8A23A",xp:30,
   theory:`การทักทายเป็นสิ่งแรกที่ต้องเรียน!\nในภาษาจีนการทักทายแตกต่างกันตามช่วงเวลา`,
   words:[{zh:"你好",pinyin:"nǐ hǎo",thai:"หนี่ เห่า",meaning:"สวัสดี"},{zh:"早上好",pinyin:"zǎo shang hǎo",thai:"เจ่า ซาง เห่า",meaning:"อรุณสวัสดิ์"},{zh:"谢谢",pinyin:"xiè xiè",thai:"เซี้ย เซี้ย",meaning:"ขอบคุณ"},{zh:"对不起",pinyin:"duì bu qǐ",thai:"ตุ้ย ปู้ ฉี่",meaning:"ขอโทษ"},{zh:"再见",pinyin:"zài jiàn",thai:"ไจ้ เจี้ยน",meaning:"ลาก่อน"},{zh:"不客气",pinyin:"bù kè qì",thai:"ปู้ เค่อ ชี่",meaning:"ไม่เป็นไร"}],
   quiz:[{q:"ขอบคุณ ภาษาจีนคือ?",opts:["你好","再见","谢谢","对不起"],a:2},{q:"再见 อ่านว่า?",opts:["เซี้ย เซี้ย","หนี่ เห่า","ไจ้ เจี้ยน","ตุ้ย ปู้ ฉี่"],a:2},{q:"ลาก่อน ภาษาจีนคือ?",opts:["你好","谢谢","对不起","再见"],a:3}]},
  {id:3,cat:"🏫 พื้นฐาน",title:"ตัวเลข 0–100",emoji:"🔢",color:"#3A9E6A",xp:30,
   theory:`ตัวเลขสำคัญมากในชีวิตประจำวัน\nเลข 11-19 = 十+เลขหน่วย เช่น 11 = 十一\nเลข 20,30 = เลขสิบ+十 เช่น 20 = 二十`,
   words:[{zh:"零",pinyin:"líng",thai:"หลิง",meaning:"0"},{zh:"一",pinyin:"yī",thai:"อี",meaning:"1"},{zh:"二",pinyin:"èr",thai:"เอ้อ",meaning:"2"},{zh:"三",pinyin:"sān",thai:"ซาน",meaning:"3"},{zh:"四",pinyin:"sì",thai:"ซื่อ",meaning:"4"},{zh:"五",pinyin:"wǔ",thai:"หวู่",meaning:"5"},{zh:"六",pinyin:"liù",thai:"หลิ่ว",meaning:"6"},{zh:"七",pinyin:"qī",thai:"ชี",meaning:"7"},{zh:"八",pinyin:"bā",thai:"ปา",meaning:"8"},{zh:"九",pinyin:"jiǔ",thai:"จิ่ว",meaning:"9"},{zh:"十",pinyin:"shí",thai:"สือ",meaning:"10"},{zh:"百",pinyin:"bǎi",thai:"ไป่",meaning:"100"}],
   quiz:[{q:"五 คือเลขอะไร?",opts:["3","4","5","6"],a:2},{q:"เลข 8 ภาษาจีนคือ?",opts:["七","八","九","六"],a:1},{q:"百 อ่านว่า?",opts:["สือ","ไป่","หลิง","อี"],a:1}]},
  {id:4,cat:"🏫 พื้นฐาน",title:"คำสรรพนาม",emoji:"🙋",color:"#3A6AE8",xp:30,
   theory:`คำสรรพนามเป็นพื้นฐานในการสร้างประโยค\nเพิ่ม 们 (men/เมิน) หลังสรรพนาม เพื่อทำให้เป็นพหูพจน์`,
   words:[{zh:"我",pinyin:"wǒ",thai:"หว่อ",meaning:"ฉัน/ผม"},{zh:"你",pinyin:"nǐ",thai:"หนี่",meaning:"คุณ"},{zh:"他",pinyin:"tā",thai:"ทา",meaning:"เขา (ชาย)"},{zh:"她",pinyin:"tā",thai:"ทา",meaning:"เธอ (หญิง)"},{zh:"我们",pinyin:"wǒ men",thai:"หว่อ เมิน",meaning:"พวกเรา"},{zh:"你们",pinyin:"nǐ men",thai:"หนี่ เมิน",meaning:"พวกคุณ"},{zh:"他们",pinyin:"tā men",thai:"ทา เมิน",meaning:"พวกเขา"}],
   quiz:[{q:"ฉัน ภาษาจีนคือ?",opts:["你","他","我","她"],a:2},{q:"我们 อ่านว่า?",opts:["หนี่ เมิน","ทา เมิน","หว่อ เมิน","ชี เมิน"],a:2},{q:"พวกคุณ ภาษาจีนคือ?",opts:["我们","他们","你们","她们"],a:2}]},
  {id:5,cat:"🏫 พื้นฐาน",title:"ประโยคแนะนำตัว",emoji:"💬",color:"#9B3AE8",xp:40,
   theory:`โครงสร้างประโยค: ประธาน + กริยา + กรรม\nคำถามใช้ 吗 (ma/มา) ต่อท้าย\nปฏิเสธใช้ 不 (bù/ปู้) นำหน้ากริยา`,
   words:[{zh:"我是泰国人",pinyin:"wǒ shì tài guó rén",thai:"หว่อ สื่อ ไท่ กั๋ว เหริน",meaning:"ฉันเป็นคนไทย"},{zh:"你叫什么名字",pinyin:"nǐ jiào shén me míng zi",thai:"หนี่ เจี้ยว เสิน เมอ หมิง จึ",meaning:"คุณชื่ออะไร?"},{zh:"我叫…",pinyin:"wǒ jiào...",thai:"หว่อ เจี้ยว...",meaning:"ฉันชื่อ..."},{zh:"你好吗",pinyin:"nǐ hǎo ma",thai:"หนี่ เห่า มา",meaning:"สบายดีไหม?"},{zh:"我很好",pinyin:"wǒ hěn hǎo",thai:"หว่อ เหิ่น เห่า",meaning:"ฉันสบายดีมาก"},{zh:"很高兴认识你",pinyin:"hěn gāo xìng rèn shi nǐ",thai:"เหิ่น เกา ซิ่ง เริ่น สือ หนี่",meaning:"ยินดีที่ได้รู้จัก"}],
   quiz:[{q:"สบายดีไหม? ภาษาจีนคือ?",opts:["你好","你好吗","我很好","谢谢"],a:1},{q:"不 ใช้ทำอะไร?",opts:["ถามคำถาม","ปฏิเสธ","ทักทาย","ขอบคุณ"],a:1},{q:"ยินดีที่ได้รู้จัก ภาษาจีนคือ?",opts:["你好吗","我很好","很高兴认识你","我叫…"],a:2}]},
  {id:6,cat:"🍜 อาหาร",title:"อาหารและร้านอาหาร",emoji:"🍜",color:"#E8563A",xp:40,
   theory:`ภาษาจีนที่ใช้ในร้านอาหาร\n吃 (chī/ชือ) = กิน\n喝 (hē/เฮอ) = ดื่ม\n要 (yào/เหยา) = ต้องการ/ขอ`,
   words:[{zh:"好吃",pinyin:"hǎo chī",thai:"เห่า ชือ",meaning:"อร่อย"},{zh:"我要这个",pinyin:"wǒ yào zhè ge",thai:"หว่อ เหยา เจ้อ เกอ",meaning:"ขออันนี้"},{zh:"多少钱",pinyin:"duō shao qián",thai:"ตัว เซา เฉียน",meaning:"ราคาเท่าไหร่?"},{zh:"菜单",pinyin:"cài dān",thai:"ไช่ ตาน",meaning:"เมนู"},{zh:"水",pinyin:"shuǐ",thai:"สุ่ย",meaning:"น้ำ"},{zh:"米饭",pinyin:"mǐ fàn",thai:"หมี่ ฝาน",meaning:"ข้าว"},{zh:"面条",pinyin:"miàn tiáo",thai:"เมี่ยน เถียว",meaning:"เส้นหมี่"},{zh:"买单",pinyin:"mǎi dān",thai:"ม่าย ตาน",meaning:"เก็บเงิน/เช็คบิล"}],
   quiz:[{q:"อร่อย ภาษาจีนคือ?",opts:["好吃","多少钱","菜单","买单"],a:0},{q:"多少钱 อ่านว่า?",opts:["ม่าย ตาน","ตัว เซา เฉียน","ไช่ ตาน","เห่า ชือ"],a:1},{q:"เช็คบิล ภาษาจีนคือ?",opts:["菜单","水","买单","米饭"],a:2}]},
  {id:7,cat:"🚇 เดินทาง",title:"การเดินทางและถามทาง",emoji:"🗺️",color:"#E8A23A",xp:40,
   theory:`คำถามทางสำคัญ:\n在哪里 (ไจ้ หน่า หลี่) = อยู่ที่ไหน?\n怎么走 (เจิ่น เมอ โจ่ว) = ไปทางไหน?`,
   words:[{zh:"在哪里",pinyin:"zài nǎ lǐ",thai:"ไจ้ หน่า หลี่",meaning:"อยู่ที่ไหน?"},{zh:"左",pinyin:"zuǒ",thai:"จั่ว",meaning:"ซ้าย"},{zh:"右",pinyin:"yòu",thai:"โย่ว",meaning:"ขวา"},{zh:"直走",pinyin:"zhí zǒu",thai:"จือ โจ่ว",meaning:"ตรงไป"},{zh:"地铁",pinyin:"dì tiě",thai:"ตี้ เถี่ย",meaning:"รถไฟฟ้า"},{zh:"出租车",pinyin:"chū zū chē",thai:"ชู จู เชอ",meaning:"แท็กซี่"},{zh:"机场",pinyin:"jī chǎng",thai:"จี ฉ่าง",meaning:"สนามบิน"},{zh:"酒店",pinyin:"jiǔ diàn",thai:"จิ่ว เตี้ยน",meaning:"โรงแรม"}],
   quiz:[{q:"ซ้าย ภาษาจีนคือ?",opts:["右","左","直走","在哪里"],a:1},{q:"地铁 อ่านว่า?",opts:["ชู จู เชอ","จี ฉ่าง","ตี้ เถี่ย","จิ่ว เตี้ยน"],a:2},{q:"สนามบิน ภาษาจีนคือ?",opts:["地铁","出租车","酒店","机场"],a:3}]},
  {id:8,cat:"🛍️ ซื้อของ",title:"การซื้อของและต่อราคา",emoji:"🛍️",color:"#3A9E6A",xp:40,

const TONE_COLORS={1:"#E8563A",2:"#E8A23A",3:"#3A9E6A",4:"#3A6AE8"};
const CATS=[...new Set(LESSONS.map(l=>l.cat))];

// STATE
let state={
  page:'home', // home | lesson | flashcard | stats | ai
  completedIds: JSON.parse(localStorage.getItem('zh_completed')||'[]'),
  xp: parseInt(localStorage.getItem('zh_xp')||'0'),
  activeLesson: null,
  lessonTab: 'theory',
  flipped: {},
  quiz: null,
  fc: null, // flashcard state
  aiMessages: [{role:'bot',text:'สวัสดีครับ! 🇨🇳 ผมคือครูจีน AI พร้อมช่วยฝึกภาษาจีนแล้ว\n\nลองพูดว่า "สอนฉันทักทาย" หรือ "ฝึกสนทนาร้านอาหาร" ได้เลยครับ!'}],
  aiLoading: false
};

function save(){
  localStorage.setItem('zh_completed',JSON.stringify(state.completedIds));
  localStorage.setItem('zh_xp',state.xp);
}

// SPEAK
function speak(text){
  if(!window.speechSynthesis) return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang='zh-CN';u.rate=0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// RENDER
function render(){
  const app=document.getElementById('app');
  let html='';
  if(state.page==='home') html=renderHome();
  else if(state.page==='lesson') html=renderLesson();
  else if(state.page==='flashcard') html=renderFlashcard();
  else if(state.page==='stats') html=renderStats();
  else if(state.page==='ai') html=renderAI();
  app.innerHTML=html+renderNav();
  bindEvents();
  if(state.page==='ai') scrollAI();
}

function renderNav(){
  const tabs=[{k:'home',icon:'🏠',label:'หน้าหลัก'},{k:'flashcard',icon:'⚡',label:'ท่องคำ'},{k:'stats',icon:'📊',label:'สถิติ'},{k:'ai',icon:'🤖',label:'ครู AI'}];
  return `<div class="bottom-nav">${tabs.map(t=>`<button class="nav-btn${state.page===t.k||( state.page==='lesson'&&t.k==='home')?' active':''}" data-nav="${t.k}"><span>${t.icon}</span>${t.label}</button>`).join('')}</div>`;
}

function renderHome(){
  const done=state.completedIds.length,total=LESSONS.length,pct=Math.round(done/total*100);
  const totalWords=LESSONS.reduce((s,l)=>s+l.words.length,0);
  let html=`<div class="hero"><div class="hero-emoji">🇨🇳</div><div class="hero-title">เรียนภาษาจีน</div><div class="hero-sub">从零开始 · เริ่มจาก 0</div><div class="hero-desc">12 บทเรียน · มีเสียง · ครู AI</div></div>
  <div class="container">
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">บทผ่านแล้ว</div></div>
      <div class="stat-card"><div class="stat-num">${state.xp}</div><div class="stat-label">XP ได้รับ</div></div>
      <div class="stat-card"><div class="stat-num">${totalWords}</div><div class="stat-label">คำศัพท์</div></div>
    </div>
    <div class="progress-label" style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px"><span>ความคืบหน้า</span><span>${done}/${total} (${pct}%)</span></div>
    <div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  CATS.forEach(cat=>{
    html+=`<div class="section-title">${cat}</div>`;
    LESSONS.filter(l=>l.cat===cat).forEach(l=>{
      const idx=LESSONS.indexOf(l),isDone=state.completedIds.includes(l.id),locked=idx>0&&!state.completedIds.includes(LESSONS[idx-1].id);
      html+=`<button class="lesson-btn${isDone?' done':''}${locked?' locked':''}" style="--color:${l.color}" data-lesson="${l.id}" ${locked?'disabled':''}>
        <div class="lesson-icon" style="background:${locked?'#eee':l.color+'22'}">${locked?'🔒':l.emoji}</div>
        <div style="flex:1"><div class="lesson-title">${l.title}${isDone?`<span class="xp-badge">+${l.xp}XP</span>`:''}</div>
        <div class="lesson-meta${isDone?' done':''}">${locked?'ผ่านบทก่อนก่อน':isDone?'✅ ผ่านแล้ว':`${l.words.length} คำ · ${l.quiz.length} คำถาม`}</div></div>
        ${!locked?`<div style="color:${l.color};font-weight:800;font-size:18px">›</div>`:''}
      </button>`;
    });
  });
  if(done===total) html+=`<div class="complete-box"><div style="font-size:40px;margin-bottom:8px">🏆</div><div style="font-weight:900;font-size:20px">จบหลักสูตรแล้ว!</div><div style="color:#C8A96E;margin-top:6px">厉害了！เก่งมากเลย!</div></div>`;
  html+=`</div>`;
  return html;
}

function renderLesson(){
  const l=state.activeLesson;
  const tab=state.lessonTab;
  const isDone=state.completedIds.includes(l.id);
  const tabs=[{k:'theory',label:'📖 ทฤษฎี'},{k:'words',label:'🃏 คำศัพท์'},{k:'quiz',label:'📝 ทดสอบ'}];
  let content='';
  if(tab==='theory'){
    content=`<div class="theory-box"><div class="theory-text">${l.theory}</div><button class="next-btn" style="background:${l.color}" data-tab="words">เรียนคำศัพท์ →</button></div>`;
  } else if(tab==='words'){
    const cards=l.words.map((w,i)=>{
      const fl=state.flipped[i];
      return `<div class="word-card${fl?' flipped':''}" data-card="${i}">
        <button class="sound-btn" data-speak="${w.zh}">🔊</button>
        ${fl?`<div class="word-pinyin" style="color:${w.tone?TONE_COLORS[w.tone]:l.color}">${w.pinyin}</div>
               <div class="word-thai">${w.thai}</div>
               <div class="word-meaning">${w.meaning}</div>`
           :`<div class="word-zh">${w.zh}</div><div class="word-hint">แตะดูคำอ่าน+ความหมาย</div>`}
      </div>`;
    }).join('');
    content=`<p style="color:#888;font-size:12px;margin-bottom:12px">🔊 แตะเสียง · แตะการ์ดดูคำอ่านภาษาไทย</p><div class="words-grid">${cards}</div><button class="next-btn" style="background:${l.color};width:100%;text-align:center" data-tab="quiz">ทำแบบทดสอบ →</button>`;
  } else {
    content=renderQuiz(l);
  }
  return `<div style="max-width:520px;margin:0 auto;padding:20px 16px">
    <button class="back-btn" id="backBtn">← กลับ</button>
    <div class="lesson-header" style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="lesson-icon" style="background:${l.color}22">${l.emoji}</div>
      <div><div style="font-weight:800;font-size:17px">${l.title}</div>${isDone?'<div style="color:#3A9E6A;font-size:11px;font-weight:600">✅ ผ่านแล้ว</div>':''}</div>
    </div>
    <div class="tabs">${tabs.map(t=>`<button class="tab-btn" style="background:${tab===t.k?l.color:'#F0EDE8'};color:${tab===t.k?'#fff':'#666'}" data-tab="${t.k}">${t.label}</button>`).join('')}</div>
    ${content}</div>`;
}

function renderQuiz(l){
  if(!state.quiz) state.quiz={current:0,selected:null,score:0,done:false};
  const q=state.quiz;
  if(q.done){
    const passed=q.score>=Math.ceil(l.quiz.length*0.7);
    return `<div class="quiz-box"><div style="text-align:center;padding:20px 0">
      <div style="font-size:52px">${passed?'🎉':'💪'}</div>
      <div style="font-size:22px;font-weight:700;margin-top:8px">${q.score}/${l.quiz.length} ข้อถูก</div>
      <div style="color:#888;margin-top:4px;margin-bottom:20px">${passed?'ผ่านแล้ว! ยอดเยี่ยม':'ลองใหม่นะครับ'}</div>
      ${passed?`<button style="background:#E8563A;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer" id="completeBtn">รับ ${l.xp} XP! →</button>`:`<button style="background:#1A1A2E;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer" id="retryBtn">ลองใหม่</button>`}
    </div></div>`;
  }
  const cur=l.quiz[q.current];
  const opts=cur.opts.map((o,i)=>{
    let bg='#fff',color='#1A1A2E';
    if(q.selected!==null){if(i===cur.a){bg='#3A9E6A';color='#fff';}else if(i===q.selected&&q.selected!==cur.a){bg='#E8563A';color='#fff';}}
    return `<button class="quiz-opt" style="background:${bg};color:${color}" data-opt="${i}" ${q.selected!==null?'disabled':''}>${o}</button>`;
  }).join('');
  return `<div class="quiz-box"><div class="quiz-header"><span>ข้อ ${q.current+1}/${l.quiz.length}</span><span>✅ ${q.score} ถูก</span></div>
    <div class="quiz-question">${cur.q}</div><div class="quiz-options">${opts}</div></div>`;
}

function renderFlashcard(){
  const allWords=LESSONS.flatMap(l=>l.words.map(w=>({...w,lessonColor:l.color})));
  if(!state.fc) state.fc={idx:0,revealed:false,correct:0,total:0,words:shuffle([...allWords])};
  const fc=state.fc;
  if(fc.idx>=fc.words.length){
    return `<div style="max-width:520px;margin:0 auto;padding:20px 16px">
      <div style="text-align:center;padding:40px 20px">
        <div style="font-size:52px">🎯</div>
        <div style="font-size:22px;font-weight:800;margin-top:12px">${fc.correct}/${fc.words.length} คำ</div>
        <div style="color:#888;margin-top:6px;margin-bottom:24px">จำได้ ${Math.round(fc.correct/fc.words.length*100)}%</div>
        <button onclick="state.fc=null;render()" style="background:#E8563A;color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:16px;font-weight:800;cursor:pointer">เล่นใหม่</button>
      </div></div>`;
  }
  const w=fc.words[fc.idx];
  return `<div style="max-width:520px;margin:0 auto;padding:20px 16px">
    <div style="font-weight:800;font-size:18px;margin-bottom:4px">⚡ โหมดท่องคำศัพท์</div>
    <div class="fc-progress">คำที่ ${fc.idx+1}/${fc.words.length} · จำได้ ${fc.correct} คำ</div>
    <div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:${fc.idx/fc.words.length*100}%"></div></div>
    <div class="fc-card${fc.revealed?' revealed':''}" id="fcCard">
      ${fc.revealed?
        `<div class="fc-pinyin" style="color:${w.tone?TONE_COLORS[w.tone]:w.lessonColor}">${w.pinyin}</div>
         <div class="fc-thai" style="color:#C8A96E">${w.thai}</div>
         <div class="fc-meaning" style="color:#fff">${w.meaning}</div>
         <button onclick="speak('${w.zh.replace(/'/g,"\\'")}');event.stopPropagation()" style="margin-top:12px;background:rgba(255,255,255,0.2);border:none;border-radius:8px;color:#fff;padding:6px 14px;font-size:14px;cursor:pointer">🔊 ฟังเสียง</button>` :
        `<div class="fc-zh">${w.zh}</div><div class="fc-hint">แตะเพื่อดูความหมาย</div>`
      }
    </div>
    ${fc.revealed?`<div class="fc-btns">
      <button class="fc-btn no" id="fcNo">❌ ยังจำไม่ได้</button>
      <button class="fc-btn yes" id="fcYes">✅ จำได้แล้ว!</button>
    </div>`:`<div style="text-align:center;color:#bbb;font-size:13px">แตะการ์ดเพื่อดูคำตอบ</div>`}
  </div>`;
}

function renderStats(){
  const done=state.completedIds.length,total=LESSONS.length;
  const totalWords=LESSONS.reduce((s,l)=>s+l.words.length,0);
  const learnedWords=LESSONS.filter(l=>state.completedIds.includes(l.id)).reduce((s,l)=>s+l.words.length,0);
  const cats=CATS.map(cat=>{
    const catL=LESSONS.filter(l=>l.cat===cat);
    const catDone=catL.filter(l=>state.completedIds.includes(l.id)).length;
    return {cat,done:catDone,total:catL.length,pct:Math.round(catDone/catL.length*100)};
  });
  const catColors=['#E8563A','#E8A23A','#3A9E6A','#3A6AE8','#9B3AE8','#E8563A','#E8A23A'];
  return `<div style="max-width:520px;margin:0 auto;padding:20px 16px">
    <div style="font-weight:900;font-size:22px;margin-bottom:20px">📊 สถิติการเรียน</div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${done}/${total}</div><div class="stat-label">บทเรียน</div></div>
      <div class="stat-card"><div class="stat-num">${state.xp}</div><div class="stat-label">XP ทั้งหมด</div></div>
      <div class="stat-card"><div class="stat-num">${learnedWords}</div><div class="stat-label">คำที่เรียนแล้ว</div></div>
    </div>
    <div style="background:#fff;border:1px solid #F0EDE8;border-radius:14px;padding:18px;margin-bottom:16px">
      <div style="font-weight:800;font-size:15px;margin-bottom:16px">ความคืบหน้าแต่ละหมวด</div>
      ${cats.map((c,i)=>`
        <div class="chart-bar-row">
          <div class="chart-bar-label">${c.cat.split(' ')[0]}</div>
          <div class="chart-bar-bg"><div class="chart-bar-fill" style="width:${c.pct}%;background:${catColors[i]}">${c.pct>15?c.pct+'%':''}</div></div>
          <div style="font-size:12px;color:#888;width:36px;flex-shrink:0">${c.done}/${c.total}</div>
        </div>`).join('')}
    </div>
    <div style="background:#fff;border:1px solid #F0EDE8;border-radius:14px;padding:18px">
      <div style="font-weight:800;font-size:15px;margin-bottom:12px">ภาพรวม</div>
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px"><span style="color:#888">คำศัพท์ทั้งหมด</span><span style="font-weight:700">${totalWords} คำ</span></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px"><span style="color:#888">คำที่เรียนแล้ว</span><span style="font-weight:700;color:#3A9E6A">${learnedWords} คำ</span></div>
      <div style="display:flex;justify-content:space-between;font-size:14px"><span style="color:#888">XP ที่ได้รับ</span><span style="font-weight:700;color:#E8563A">${state.xp} XP</span></div>
    </div>
  </div>`;
}

function renderAI(){
  const suggests=['สอนทักทายภาษาจีน','ฝึกสนทนาร้านอาหาร','วรรณยุกต์ 4 แบบต่างกันยังไง','ช่วยฝึกแนะนำตัว','คำที่ใช้บ่อยที่สุด'];
  const msgs=state.aiMessages.map(m=>`<div class="ai-msg ${m.role}">${m.role==='bot'&&m.loading?`<div class="ai-thinking"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>`:m.text.replace(/\n/g,'<br>')}</div>`).join('');
  return `<div style="max-width:520px;margin:0 auto;padding:16px 16px 0">
    <div style="font-weight:900;font-size:20px;margin-bottom:12px">🤖 ครู AI สอนภาษาจีน</div>
    <div class="ai-box">
      <div class="ai-messages" id="aiMsgs">${msgs}</div>
      <div style="padding:8px 12px;border-top:1px solid #F0EDE8;overflow-x:auto;white-space:nowrap">${suggests.map(s=>`<button class="suggest-btn" data-suggest="${s}">${s}</button>`).join('')}</div>
      <div class="ai-input-row">
        <input class="ai-input" id="aiInput" placeholder="ถามครู AI ภาษาจีน..." />
        <button class="ai-send" id="aiSend">ส่ง</button>
      </div>
    </div>
  </div>`;
}

// EVENTS
function bindEvents(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.addEventListener('click',()=>{
    state.page=b.dataset.nav;if(state.page!=='lesson')state.activeLesson=null;render();
  }));
  document.querySelectorAll('[data-lesson]').forEach(b=>b.addEventListener('click',()=>{
    state.activeLesson=LESSONS.find(l=>l.id===parseInt(b.dataset.lesson));
    state.lessonTab='theory';state.flipped={};state.quiz=null;state.page='lesson';render();
  }));
  document.getElementById('backBtn')?.addEventListener('click',()=>{state.page='home';render();});
  document.querySelectorAll('.tab-btn,[data-tab]').forEach(b=>b.addEventListener('click',()=>{
    state.lessonTab=b.dataset.tab;if(b.dataset.tab==='quiz')state.quiz=null;state.flipped={};render();
  }));
  document.querySelectorAll('.word-card').forEach(c=>c.addEventListener('click',(e)=>{
    if(e.target.closest('.sound-btn'))return;
    const i=parseInt(c.dataset.card);state.flipped[i]=!state.flipped[i];render();
  }));
  document.querySelectorAll('[data-speak]').forEach(b=>b.addEventListener('click',(e)=>{
    e.stopPropagation();speak(b.dataset.speak);
  }));
  document.querySelectorAll('.quiz-opt').forEach(b=>b.addEventListener('click',()=>{
    const i=parseInt(b.dataset.opt),l=state.activeLesson,cur=l.quiz[state.quiz.current];
    state.quiz.selected=i;if(i===cur.a)state.quiz.score++;render();
    setTimeout(()=>{
      if(state.quiz.current+1<l.quiz.length){state.quiz.current++;state.quiz.selected=null;}
      else state.quiz.done=true;
      render();
    },900);
  }));
  document.getElementById('completeBtn')?.addEventListener('click',()=>{
    const l=state.activeLesson;
    if(!state.completedIds.includes(l.id)){state.completedIds.push(l.id);state.xp+=l.xp;save();}
    state.page='home';render();
  });
  document.getElementById('retryBtn')?.addEventListener('click',()=>{state.quiz=null;render();});
  // Flashcard
  document.getElementById('fcCard')?.addEventListener('click',()=>{state.fc.revealed=true;render();});
  document.getElementById('fcNo')?.addEventListener('click',()=>{
    const w=state.fc.words[state.fc.idx];state.fc.words.push(w);
    state.fc.idx++;state.fc.revealed=false;render();
  });
  document.getElementById('fcYes')?.addEventListener('click',()=>{
    state.fc.correct++;state.fc.idx++;state.fc.revealed=false;render();
  });
  // AI
  document.querySelectorAll('[data-suggest]').forEach(b=>b.addEventListener('click',()=>sendAI(b.dataset.suggest)));
  document.getElementById('aiSend')?.addEventListener('click',()=>{
    const inp=document.getElementById('aiInput');
    if(inp&&inp.value.trim())sendAI(inp.value.trim());
  });
  document.getElementById('aiInput')?.addEventListener('keydown',e=>{
    if(e.key==='Enter'){const inp=e.target;if(inp.value.trim())sendAI(inp.value.trim());}
  });
}

function scrollAI(){
  const el=document.getElementById('aiMsgs');
  if(el) el.scrollTop=el.scrollHeight;
}

async function sendAI(text){
  state.aiMessages.push({role:'user',text});
  state.aiMessages.push({role:'bot',text:'',loading:true});
  state.page='ai';render();
  try{
    const allWords=LESSONS.flatMap(l=>l.words.map(w=>`${w.zh}(${w.pinyin}/${w.thai})=${w.meaning}`)).join(', ');
    const sys=`คุณคือครูสอนภาษาจีนกลาง (ภาษาไทย) ชื่อ "ครูจีน AI" สอนผู้เริ่มต้นชาวไทย
กฎ:
- ตอบเป็นภาษาไทยเสมอ
- ใส่อักษรจีน + พินอิน + คำอ่านภาษาไทย ทุกครั้งที่มีคำจีน เช่น 你好 (nǐ hǎo/หนี่ เห่า) = สวัสดี
- สอนแบบเป็นกันเอง สนุก ใช้ emoji
- ถ้าขอฝึกสนทนา ให้เล่นบทสนทนาสั้นๆ แล้วให้ผู้เรียนตอบ
- ให้กำลังใจเสมอ
- คำศัพท์ในแอป: ${allWords.substring(0,500)}`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:1000,
        system:sys,
        messages:state.aiMessages.filter(m=>!m.loading&&m.text).map(m=>({role:m.role==='bot'?'assistant':'user',content:m.text}))
      })
    });
    const data=await res.json();
    const reply=data.content?.map(c=>c.text||'').join('')||'ขอโทษครับ ลองใหม่อีกครั้งนะ';
    state.aiMessages.pop();
    state.aiMessages.push({role:'bot',text:reply});
  }catch(e){
    state.aiMessages.pop();
    state.aiMessages.push({role:'bot',text:'ขอโทษครับ เกิดข้อผิดพลาด ลองใหม่อีกครั้งนะครับ 🙏'});
  }
  render();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

render();
</script>
